name: Build SteamRegister Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --icon=logo.ico `
            --name=SteamRegister `
            --add-data "logo.png;." `
            main.py

      - uses: actions/upload-artifact@v4
        with:
          name: SteamRegister-Windows
          path: dist/SteamRegister.exe
